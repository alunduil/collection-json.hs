name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.3.1.4) — must already exist as a Hackage candidate'
        required: true
        type: string

permissions:
  contents: read

jobs:
  candidate:
    name: Upload Hackage candidate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify tag matches cabal version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          cabal_version="$(grep -i '^version:' collection-json.cabal | awk '{print $2}')"
          tag_version="${TAG#v}"
          tag_version="${tag_version%%-*}"
          if [ "$cabal_version" != "$tag_version" ]; then
            echo "::error::Tag $TAG resolves to version $tag_version but collection-json.cabal declares $cabal_version"
            exit 1
          fi

      - uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2
        with:
          ghc-version: 'latest'
          cabal-version: 'latest'

      - run: cabal update

      - run: cabal sdist

      - run: cabal haddock --haddock-for-hackage

      - name: Upload sdist as candidate
        env:
          HACKAGE_KEY: ${{ secrets.HACKAGE_TOKEN }}
        run: cabal upload dist-newstyle/sdist/*.tar.gz

      - name: Upload documentation as candidate
        env:
          HACKAGE_KEY: ${{ secrets.HACKAGE_TOKEN }}
        run: cabal upload --documentation dist-newstyle/*-docs.tar.gz

  publish:
    name: Publish to Hackage
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: hackage
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.tag }}

      - name: Verify tag matches cabal version
        env:
          TAG: ${{ inputs.tag }}
        run: |
          cabal_version="$(grep -i '^version:' collection-json.cabal | awk '{print $2}')"
          tag_version="${TAG#v}"
          tag_version="${tag_version%%-*}"
          if [ "$cabal_version" != "$tag_version" ]; then
            echo "::error::Tag $TAG resolves to version $tag_version but collection-json.cabal declares $cabal_version"
            exit 1
          fi

      - uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2
        with:
          ghc-version: 'latest'
          cabal-version: 'latest'

      - run: cabal update

      - run: cabal sdist

      - run: cabal haddock --haddock-for-hackage

      - name: Publish sdist
        env:
          HACKAGE_KEY: ${{ secrets.HACKAGE_TOKEN }}
        run: cabal upload --publish dist-newstyle/sdist/*.tar.gz

      - name: Publish documentation
        env:
          HACKAGE_KEY: ${{ secrets.HACKAGE_TOKEN }}
        run: cabal upload --publish --documentation dist-newstyle/*-docs.tar.gz
