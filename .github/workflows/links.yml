name: Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Fridays ~18:00 Europe/London, so a report is waiting heading into the
    # weekend. Cron is UTC-fixed and ignores DST: this fires at 18:00 local
    # during BST and 17:00 during GMT.
    - cron: "0 17 * * 5"

permissions:
  contents: read
  # The scheduled run files an issue when it finds dead links; PR and push
  # runs fail loudly instead and don't use this.
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config lychee.toml --no-progress "./**/*.md"
          # Fail the job on PR and push so a dead link blocks the merge; on the
          # scheduled run continue, so the next step can file a tracking issue.
          fail: ${{ github.event_name != 'schedule' }}

      # Only reached on the scheduled run (PR/push already failed above). lychee
      # writes its Markdown report to lychee/out.md. Refresh the open tracking
      # issue if one exists rather than filing a fresh duplicate each Friday;
      # create-issue-from-file can't update, so drive gh directly.
      - name: File or refresh broken-links issue
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != 0
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: Broken links detected
        run: |
          number=$(gh issue list --state open --label documentation \
            --json number,title \
            --jq "map(select(.title == \"$TITLE\")) | .[0].number // empty")
          if [ -n "$number" ]; then
            gh issue edit "$number" --body-file lychee/out.md
            echo "Refreshed existing issue #$number"
          else
            gh issue create --title "$TITLE" --label documentation \
              --body-file lychee/out.md
          fi
