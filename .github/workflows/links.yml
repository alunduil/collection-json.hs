name: Links

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Fridays ~18:00 Europe/London, so a report is waiting heading into the
    # weekend. Cron is UTC-fixed and ignores DST: this fires at 18:00 local
    # during BST and 17:00 during GMT.
    - cron: "0 17 * * 5"

permissions:
  contents: read
  # The scheduled run files an issue when it finds dead links; PR and push
  # runs fail loudly instead and don't use this.
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lychee:
    name: Check links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: lychee-${{ github.sha }}
          restore-keys: lychee-

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: --config lychee.toml --no-progress "./**/*.md"
          # Fail the job on PR and push so a dead link blocks the merge; on the
          # scheduled run continue, so the next step can file a tracking issue.
          fail: ${{ github.event_name != 'schedule' }}

      # Only reached on the scheduled run (PR/push already failed above). lychee
      # writes its Markdown report to lychee/out.md.
      - name: File issue for broken links
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: Broken links detected
          content-filepath: lychee/out.md
          labels: documentation
