name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: GHC ${{ matrix.ghc }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ghc: ["9.6", "9.8", "9.10", "9.12", "9.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up GHC ${{ matrix.ghc }}
        id: setup
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: ${{ matrix.ghc }}
          cabal-version: latest

      - name: Update Hackage index
        run: cabal update

      # Everything below builds from the sdist tarball, not the working
      # tree: it exercises the bare published bounds a Hackage consumer
      # faces and validates that every source and test file is packaged.
      #
      # The lone exception: the test-only network-arbitrary still caps
      # base < 4.21 (no GHC 9.12+) and lags QuickCheck, so its bounds on
      # those two are relaxed via allow-newer below, pending a release
      # (alunduil/network-arbitrary#106). Scoped to that one package, so
      # the library's own published bounds stay strictly enforced; grep
      # allow-newer to remove the stopgap once the release ships.
      - name: Build sdist
        run: cabal sdist all

      - name: Unpack sdist
        shell: bash
        run: |
          mkdir sdist-build
          tar xf dist-newstyle/sdist/collection-json-*.tar.gz \
            -C sdist-build --strip-components=1

      - name: Generate build plan
        working-directory: sdist-build
        run: cabal build all --enable-tests --dry-run --allow-newer=network-arbitrary:base,network-arbitrary:QuickCheck

      - name: Restore cabal store
        id: cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        env:
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-cabal-${{ steps.setup.outputs.cabal-version }}
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ env.key }}-plan-${{ hashFiles('sdist-build/dist-newstyle/cache/plan.json') }}
          restore-keys: ${{ env.key }}-

      - name: Install dependencies
        working-directory: sdist-build
        run: cabal build all --enable-tests --only-dependencies --allow-newer=network-arbitrary:base,network-arbitrary:QuickCheck

      - name: Save cabal store
        if: steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: Build
        working-directory: sdist-build
        run: cabal build all --enable-tests --allow-newer=network-arbitrary:base,network-arbitrary:QuickCheck

      - name: Test
        working-directory: sdist-build
        run: cabal test all --enable-tests --test-show-details=direct --allow-newer=network-arbitrary:base,network-arbitrary:QuickCheck

      - name: Check package metadata
        working-directory: sdist-build
        run: cabal check

      - name: Haddock
        working-directory: sdist-build
        run: cabal haddock all --allow-newer=network-arbitrary:base,network-arbitrary:QuickCheck

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up GHC
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11.0
        with:
          ghc-version: "9.14"
          cabal-version: latest

      - name: Update Hackage index
        run: cabal update

      # Coverage builds from the working tree, not the sdist the build
      # job uses: the instrumented .mix/.tix paths then map straight onto
      # the repo's src/ layout that Codecov reports against. allow-newer
      # mirrors the build job's network-arbitrary stopgap.
      - name: Configure with coverage
        run: cabal configure --enable-tests --enable-coverage --allow-newer=network-arbitrary:base,network-arbitrary:QuickCheck

      - name: Build
        run: cabal build all

      - name: Test
        run: cabal test all --test-show-details=direct

      # excludes drops the test components so the report measures the
      # library module alone.
      - name: Generate coverage report
        id: report
        uses: 8c6794b6/hpc-codecov-action@f943f40733e5390825b12d72165cad991e44340c # v4.3.0
        with:
          target: cabal:collection-json-tests
          excludes: Main,Paths_collection_json,Data.CollectionJSONSpec,Data.CollectionJSON.Arbitrary

      - name: Upload to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.report.outputs.report }}
          fail_ci_if_error: true
