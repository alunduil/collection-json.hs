name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: Format & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run fourmolu
        uses: haskell-actions/run-fourmolu@v11
        with:
          version: "0.19.0.1"

      - name: Set up HLint
        uses: haskell-actions/hlint-setup@v2
        with:
          version: "3.10"

      - name: Run HLint
        uses: haskell-actions/hlint-run@v2
        with:
          path: '["src/", "test/"]'
          fail-on: warning
