# Vale configuration for collection-json.
# https://vale.sh/docs/topics/config/
#
# Rule-tuning policy: rules keep the severity their package ships, and
# prose is rewritten to comply rather than demoting a rule to silence
# it. The only exceptions are deduping rules that overlap across
# packages and exempting documents that aren't ours to restyle.

StylesPath = .vale/styles
MinAlertLevel = suggestion
Packages = Microsoft, proselint, alex
Vocab = CollectionJSON

[*.md]
BasedOnStyles = Vale, Microsoft, proselint, alex
proselint.Cliches = NO     # Microsoft.Terms covers the same ground
proselint.Spelling = NO    # Vale.Spelling owns spelling

# Exempt documents that aren't ours to restyle: CLAUDE.md is AI-targeted
# guidance in a terse register, CODE_OF_CONDUCT.md is the verbatim
# Contributor Covenant, and CHANGELOG.md is dense structured release
# notes (naming tools and versions, not prose where voice matters).
[{CLAUDE,CODE_OF_CONDUCT,CHANGELOG}.md]
BasedOnStyles =
