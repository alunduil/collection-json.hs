# Pre-commit configuration for collection-json.
#
# Install:    pre-commit install
# Run all:    pre-commit run --all-files
# Update:     pre-commit autoupdate

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
        exclude: '^\.github/workflows/'

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  # Vale prose linting. The first hook installs the styles declared in
  # `.vale.ini`; the second lints Markdown, gating on errors only.
  - repo: https://github.com/errata-ai/vale
    rev: v3.15.1
    hooks:
      - id: vale
        args: [sync]
        pass_filenames: false
      - id: vale
        args: [--output=line, --minAlertLevel=error]
        types: [markdown]

  # fourmolu and hlint are installed in the dev environment (or in CI by the
  # Pre-commit workflow) and invoked from PATH. Renovate's pre-commit manager
  # only tracks third-party hooks with a `rev:` field, so the pinned versions
  # for these tools live in `.github/workflows/pre-commit.yml`.
  - repo: local
    hooks:
      - id: fourmolu
        name: fourmolu
        entry: fourmolu --mode inplace
        language: system
        types: [haskell]
      - id: hlint
        name: hlint
        entry: hlint
        language: system
        types: [haskell]
