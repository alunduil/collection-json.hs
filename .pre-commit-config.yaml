# Pre-commit configuration for collection-json.
#
# Install:    pre-commit install
# Run all:    pre-commit run --all-files
# Update:     pre-commit autoupdate

# .vale/styles/ is vendored by `vale sync`; only config/ (our vocabulary)
# is ours. Keep the vendored packages out of every hook.
exclude: ^\.vale/styles/(?!config/)

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
        exclude: '^\.github/workflows/'

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2

  # Vale prose linting over Markdown, gating on errors only. Styles are
  # vendored under .vale/styles (see the top-level exclude), so the hook
  # needs no `vale sync` step.
  - repo: https://github.com/errata-ai/vale
    rev: v3.15.1
    hooks:
      - id: vale
        args: [--output=line, --minAlertLevel=error]
        types: [markdown]

  - repo: https://github.com/renovatebot/pre-commit-hooks
    rev: 43.270.0
    hooks:
      - id: renovate-config-validator
        args: [--strict, --no-global]

  # fourmolu and hlint are installed in the dev environment (or in CI by the
  # Pre-commit workflow) and invoked from PATH. Renovate's pre-commit manager
  # only tracks third-party hooks with a `rev:` field, so the pinned versions
  # for these tools live in `.github/workflows/pre-commit.yml`.
  - repo: local
    hooks:
      - id: fourmolu
        name: fourmolu
        entry: fourmolu --mode inplace
        language: system
        types: [haskell]
      - id: hlint
        name: hlint
        entry: hlint
        language: system
        types: [haskell]
